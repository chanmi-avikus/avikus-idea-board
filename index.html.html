<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>조직문화 붐업 게시판</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', '맑은 고딕', sans-serif;
  background: #f5f5f0;
  color: #1a1a1a;
  font-size: 14px;
  line-height: 1.6;
}

.wrap { padding: 16px; max-width: 1600px; margin: 0 auto; }

/* TOP BAR */
.top-bar {
  background: #fff;
  border: 1px solid #e8e8e4;
  border-radius: 12px;
  padding: 20px 24px;
  margin-bottom: 16px;
}
.top-bar-title-row { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
.top-bar h1 { font-size: 20px; font-weight: 600; color: #111; }
.top-bar .subtitle { font-size: 13px; color: #888; margin-bottom: 16px; }

.live-dot {
  display: inline-block; width: 8px; height: 8px; border-radius: 50%;
  background: #22c55e; animation: pulse 1.5s infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.85)} }

/* STATS */
.stats-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
.stat-card {
  background: #f5f5f0;
  border-radius: 8px;
  padding: 12px 18px;
  flex: 1; min-width: 110px;
}
.stat-card .label { font-size: 11px; color: #888; margin-bottom: 4px; }
.stat-card .val { font-size: 24px; font-weight: 600; color: #111; }

/* AWARD */
.award-banner {
  background: #fafaf7;
  border: 1px solid #e8e8e4;
  border-radius: 10px;
  padding: 14px 18px;
  margin-bottom: 16px;
}
.award-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.award-header h3 { font-size: 13px; font-weight: 600; color: #555; }
.award-header select {
  font-size: 12px; padding: 4px 8px; border-radius: 6px;
  border: 1px solid #ddd; background: #fff; color: #333; cursor: pointer;
}
.award-row { display: flex; gap: 8px; flex-wrap: wrap; }
.award-item {
  background: #fff;
  border: 1px solid #e8e8e4;
  border-radius: 8px;
  padding: 10px 14px;
  flex: 1; min-width: 140px;
}
.award-item .rank { font-size: 11px; color: #999; margin-bottom: 3px; }
.award-item .a-name { font-weight: 600; font-size: 14px; margin-bottom: 2px; }
.award-item .pts { font-size: 11px; color: #888; }
.gold .a-name { color: #B8860B; }
.silver .a-name { color: #6A7F8E; }
.bronze .a-name { color: #8B5A3A; }
.award-empty { font-size: 13px; color: #aaa; }

/* FILTER ROW */
.filter-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.filter-row select, .filter-row input[type=text] {
  font-size: 13px; padding: 6px 10px;
  border-radius: 8px; border: 1px solid #ddd;
  background: #fff; color: #333; height: 34px;
}
.filter-row input[type=text] { flex: 1; min-width: 160px; }
.add-btn {
  background: #111; color: #fff;
  border: none; border-radius: 8px; padding: 0 16px;
  font-size: 13px; font-weight: 600; cursor: pointer; height: 34px;
  white-space: nowrap; transition: background 0.15s;
}
.add-btn:hover { background: #333; }

/* BOARD */
.board {
  display: flex;
  flex-direction: row;
  gap: 14px;
  margin-top: 16px;
  overflow-x: auto;
  align-items: flex-start;
  padding-bottom: 12px;
}
.board::-webkit-scrollbar { height: 6px; }
.board::-webkit-scrollbar-track { background: transparent; }
.board::-webkit-scrollbar-thumb { background: #ddd; border-radius: 99px; }
.col-wrap { display: flex; flex-direction: column; min-width: 270px; flex: 0 0 270px; }
.col-header {
  background: #fff;
  border: 1px solid #e8e8e4;
  border-radius: 8px;
  padding: 10px 14px;
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px;
}
.col-badge {
  background: #f0f0eb; border-radius: 99px;
  padding: 2px 9px; font-size: 12px; color: #666; font-weight: 500;
}

/* CARD */
.card {
  background: #fff;
  border: 1px solid #e8e8e4;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 10px;
  transition: box-shadow 0.15s;
}
.card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
.card-top { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
.card-tag {
  display: inline-block; font-size: 11px;
  border-radius: 99px; padding: 3px 10px; font-weight: 600;
}
.new-badge {
  background: #22c55e; color: #fff;
  border-radius: 99px; padding: 2px 8px; font-size: 10px; font-weight: 700;
  animation: popIn 0.3s ease;
}
@keyframes popIn { from{opacity:0;transform:scale(0.7)} to{opacity:1;transform:scale(1)} }

.card-title { font-size: 14px; font-weight: 600; color: #111; margin-bottom: 8px; line-height: 1.4; }
.card-section-label { font-size: 11px; color: #aaa; margin: 8px 0 3px; font-weight: 500; letter-spacing: 0.3px; }
.card-body { font-size: 13px; color: #555; line-height: 1.65; }
.card-tip {
  font-size: 12px; color: #666; line-height: 1.6;
  background: #fafaf7; border-radius: 6px; padding: 8px 10px; margin-top: 4px;
}
.card-hash { font-size: 12px; color: #185FA5; margin: 8px 0 0; }
.card-link a { font-size: 12px; color: #185FA5; text-decoration: none; display: inline-block; margin-top: 6px; }
.card-link a:hover { text-decoration: underline; }
.card-meta { font-size: 11px; color: #bbb; margin-top: 10px; }

.card-footer {
  display: flex; align-items: center; gap: 8px;
  margin-top: 12px; padding-top: 10px;
  border-top: 1px solid #f0f0eb;
}
.like-btn {
  background: none; border: 1px solid #e0e0da;
  border-radius: 7px; padding: 4px 12px;
  font-size: 12px; cursor: pointer;
  color: #888; transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.like-btn:hover { background: #fff0f0; border-color: #fca5a5; color: #dc2626; }
.like-btn.liked { background: #fff0f0; border-color: #fca5a5; color: #dc2626; }
.comment-btn {
  background: none; border: 1px solid #e0e0da;
  border-radius: 7px; padding: 4px 12px;
  font-size: 12px; cursor: pointer; color: #888;
  transition: background 0.15s;
}
.comment-btn:hover { background: #f5f5f0; }
.card-author { margin-left: auto; font-size: 11px; color: #bbb; }

/* COMMENTS */
.comment-area { display: none; margin-top: 10px; }
.comment-area.open { display: block; }
.comment-item {
  font-size: 12px; color: #555; padding: 5px 0;
  border-bottom: 1px solid #f0f0eb;
}
.comment-item .cname { font-weight: 600; color: #333; margin-right: 5px; }
.comment-input-row { display: flex; gap: 6px; margin-top: 8px; }
.comment-input-row input {
  flex: 1; font-size: 12px; padding: 5px 8px;
  border: 1px solid #ddd; border-radius: 6px;
  background: #fff; color: #333;
}
.comment-input-row button {
  background: #111; color: #fff;
  border: none; border-radius: 6px;
  padding: 5px 12px; font-size: 12px; cursor: pointer;
}
.comment-input-row button:hover { background: #333; }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 200;
  display: none; align-items: center; justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: #fff;
  border-radius: 14px;
  padding: 24px;
  width: 100%; max-width: 500px;
  max-height: 88vh; overflow-y: auto;
  box-shadow: 0 8px 40px rgba(0,0,0,0.18);
}
.modal h2 { font-size: 17px; font-weight: 700; color: #111; margin-bottom: 16px; }
.modal label {
  font-size: 12px; color: #888; font-weight: 600;
  display: block; margin-bottom: 4px; margin-top: 12px;
}
.modal input, .modal textarea, .modal select {
  width: 100%;
  border: 1px solid #ddd; border-radius: 8px;
  padding: 9px 12px; font-size: 14px;
  background: #fff; color: #111;
  font-family: inherit;
}
.modal input:focus, .modal textarea:focus, .modal select:focus {
  outline: none; border-color: #999;
}
.modal textarea { resize: vertical; min-height: 90px; }
.modal-btns { display: flex; gap: 8px; margin-top: 18px; }
.modal-btns button {
  flex: 1; padding: 10px;
  border-radius: 8px; font-size: 14px; cursor: pointer;
  font-weight: 600; transition: background 0.15s;
}
.btn-cancel {
  background: #f5f5f0; border: 1px solid #e0e0da; color: #555;
}
.btn-cancel:hover { background: #eee; }
.btn-submit {
  background: #111; border: none; color: #fff;
}
.btn-submit:hover { background: #333; }

/* COMMENT MODAL */
.comment-modal-list { max-height: 250px; overflow-y: auto; margin-bottom: 12px; }

/* TOAST */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #111; color: #fff; border-radius: 8px;
  padding: 10px 22px; font-size: 13px; font-weight: 500;
  opacity: 0; pointer-events: none; z-index: 999;
  transition: opacity 0.25s;
}
.toast.show { opacity: 1; }

/* empty */
.empty-col { font-size: 13px; color: #ccc; padding: 16px 0; text-align: center; }
</style>
</head>
<body>

<div class="wrap">

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="top-bar-title-row">
      <span class="live-dot"></span>
      <h1>조직문화 붐업 게시판</h1>
    </div>
    <p class="subtitle">팀원 모두가 실시간으로 참여하는 우리 조직만의 살아있는 게시판</p>

    <div class="stats-row" id="statsRow">
      <div class="stat-card"><div class="label">전체 게시물</div><div class="val" id="statTotal">0</div></div>
      <div class="stat-card"><div class="label">이번 달 게시물</div><div class="val" id="statMonth">0</div></div>
      <div class="stat-card"><div class="label">전체 좋아요</div><div class="val" id="statLikes">0</div></div>
      <div class="stat-card"><div class="label">전체 댓글</div><div class="val" id="statComments">0</div></div>
    </div>

    <div class="award-banner">
      <div class="award-header">
        <h3>🏆 시상 현황</h3>
        <select id="awardPeriod" onchange="renderAwards()">
          <option value="month">이번 달</option>
          <option value="quarter">이번 분기</option>
          <option value="year">올해</option>
        </select>
      </div>
      <div class="award-row" id="awardRow"></div>
    </div>

    <div class="filter-row">
      <select id="filterCat" onchange="renderBoard()">
        <option value="">전체 카테고리</option>
        <option value="업무치트키">업무치트키</option>
        <option value="팀 패치노트">팀 패치노트</option>
        <option value="기술 SOS">기술 SOS</option>
        <option value="에너지 세이버">에너지 세이버</option>
        <option value="미식 가이드">미식 가이드</option>
        <option value="오프 리듬">오프 리듬</option>
      </select>
      <select id="filterSort" onchange="renderBoard()">
        <option value="newest">최신순</option>
        <option value="likes">좋아요순</option>
        <option value="comments">댓글순</option>
      </select>
      <input type="text" id="searchInput" placeholder="제목/내용 검색..." oninput="renderBoard()">
      <button class="add-btn" onclick="openModal()">+ 새 게시물</button>
    </div>
  </div>

  <!-- BOARD -->
  <div class="board" id="board"></div>

</div>

<!-- 새 게시물 모달 -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>새 게시물 작성</h2>
    <label>카테고리 *</label>
    <select id="newCat">
      <option value="업무치트키">업무치트키 (The Shortcut)</option>
      <option value="팀 패치노트">팀 패치노트 (Patch Notes)</option>
      <option value="기술 SOS">기술 SOS (집단지성)</option>
      <option value="에너지 세이버">에너지 세이버 (Energy Saver)</option>
      <option value="미식 가이드">미식 가이드 (Gourmet Route)</option>
      <option value="오프 리듬">오프 리듬 (Off-Rhythm)</option>
    </select>
    <label>작성자 이름 *</label>
    <input id="newAuthor" type="text" placeholder="이름을 입력해 주세요">
    <label>제목 *</label>
    <input id="newTitle" type="text" placeholder="제목을 입력해 주세요">
    <label>내용 *</label>
    <textarea id="newContent" placeholder="내용을 입력해 주세요"></textarea>
    <label>팁 / 프롬프트 (선택)</label>
    <textarea id="newTip" placeholder="추가 팁이나 프롬프트가 있다면 입력해 주세요"></textarea>
    <label>해시태그 (선택, 예: #업무 #효율)</label>
    <input id="newHash" type="text" placeholder="#태그1 #태그2">
    <label>관련 링크 (선택)</label>
    <input id="newLink" type="text" placeholder="https://...">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-submit" onclick="submitCard()">게시하기</button>
    </div>
  </div>
</div>

<!-- 댓글 모달 -->
<div class="modal-overlay" id="commentModal">
  <div class="modal">
    <h2 id="commentModalTitle">댓글</h2>
    <div class="comment-modal-list" id="commentModalList"></div>
    <div class="comment-input-row">
      <input id="commentModalName" type="text" placeholder="이름" style="max-width:110px;">
      <input id="commentModalText" type="text" placeholder="댓글을 입력해 주세요..." onkeydown="if(event.key==='Enter')submitCommentModal()">
      <button onclick="submitCommentModal()">등록</button>
    </div>
    <div class="modal-btns" style="margin-top:12px;">
      <button class="btn-cancel" onclick="closeCommentModal()">닫기</button>
    </div>
  </div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

// ─── 상태 ──────────────────────────────────────────────────
let cards = [];
let activeCommentId = null;
const STORAGE_KEY = 'boom_board_v2';

// ─── localStorage 기반 실시간 공유 ─────────────────────────
// Confluence HTML 매크로 환경에서 같은 페이지 내 공유
// 실제 멀티유저 환경에서는 BroadcastChannel을 활용

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(cards)); } catch(e) {}
  try { sessionStorage.setItem(STORAGE_KEY, JSON.stringify(cards)); } catch(e) {}
}

function load() {
  let saved = null;
  try { saved = localStorage.getItem(STORAGE_KEY); } catch(e) {}
  if (!saved) {
    try { saved = sessionStorage.getItem(STORAGE_KEY); } catch(e) {}
  }
  if (saved) {
    try {
      const parsed = JSON.parse(saved);
      if (parsed && parsed.length > 0) { cards = parsed; return; }
    } catch(e) {}
  }
  cards = INIT_CARDS.map(c => ({ ...c, comments: [...(c.comments||[])] }));
  save();
}

// BroadcastChannel으로 같은 도메인 탭 간 실시간 동기화
let bc = null;
try {
  bc = new BroadcastChannel('boom_board');
  bc.onmessage = (e) => {
    if (e.data && e.data.type === 'update') {
      cards = e.data.cards;
      renderAll();
      showToast('새 업데이트가 있어요!');
    }
  };
} catch(e) {}

function broadcast() {
  if (bc) bc.postMessage({ type: 'update', cards });
}

// ─── 렌더 ──────────────────────────────────────────────────
function renderAll() {
  renderStats();
  renderAwards();
  renderBoard();
}

function renderStats() {
  const now = new Date();
  const m = now.getMonth(), y = now.getFullYear();
  document.getElementById('statTotal').textContent = cards.length;
  document.getElementById('statMonth').textContent = cards.filter(c => {
    const d = new Date(c.date);
    return d.getMonth() === m && d.getFullYear() === y;
  }).length;
  document.getElementById('statLikes').textContent = cards.reduce((s, c) => s + (c.likes || 0), 0);
  document.getElementById('statComments').textContent = cards.reduce((s, c) => s + (c.comments ? c.comments.length : 0), 0);
}

function renderAwards() {
  const period = document.getElementById('awardPeriod').value;
  const now = new Date();
  const filtered = cards.filter(c => {
    const d = new Date(c.date);
    if (period === 'month') return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    if (period === 'quarter') return Math.floor(d.getMonth() / 3) === Math.floor(now.getMonth() / 3) && d.getFullYear() === now.getFullYear();
    return d.getFullYear() === now.getFullYear();
  });

  const map = {};
  filtered.forEach(c => {
    const a = c.author || '익명';
    if (!map[a]) map[a] = { name: a, likes: 0, comments: 0, posts: 0, score: 0 };
    map[a].likes += (c.likes || 0);
    map[a].comments += (c.comments ? c.comments.length : 0);
    map[a].posts += 1;
    map[a].score += (c.likes || 0) * 3 + (c.comments ? c.comments.length : 0) * 2 + 1;
  });

  const sorted = Object.values(map).sort((a, b) => b.score - a.score).slice(0, 3);
  const medals = ['gold', 'silver', 'bronze'];
  const labels = ['🥇 1위', '🥈 2위', '🥉 3위'];
  const row = document.getElementById('awardRow');

  if (sorted.length === 0) {
    row.innerHTML = '<div class="award-empty">해당 기간에 게시물이 없습니다</div>';
    return;
  }
  row.innerHTML = sorted.map((a, i) => `
    <div class="award-item ${medals[i]}">
      <div class="rank">${labels[i]}</div>
      <div class="a-name">${a.name}</div>
      <div class="pts">게시물 ${a.posts}개 · 좋아요 ${a.likes} · 댓글 ${a.comments} · 점수 ${a.score}</div>
    </div>
  `).join('');
}

function renderBoard() {
  const filterCat = document.getElementById('filterCat').value;
  const sort = document.getElementById('filterSort').value;
  const search = document.getElementById('searchInput').value.toLowerCase();

  let list = cards.filter(c => {
    if (filterCat && !c.cat.includes(filterCat)) return false;
    if (search && !c.title.toLowerCase().includes(search) && !(c.content || '').toLowerCase().includes(search)) return false;
    return true;
  });

  if (sort === 'likes') list.sort((a, b) => (b.likes || 0) - (a.likes || 0));
  else if (sort === 'comments') list.sort((a, b) => (b.comments ? b.comments.length : 0) - (a.comments ? a.comments.length : 0));
  else list.sort((a, b) => b.id - a.id);

  // 카테고리 그룹화
  const catOrder = Object.keys(CATS);
  const groups = {};
  list.forEach(c => {
    const k = catKey(c.cat);
    if (!groups[k]) groups[k] = [];
    groups[k].push(c);
  });

  const board = document.getElementById('board');
  board.innerHTML = '';

  const orderedKeys = catOrder.filter(k => groups[k]);
  if (orderedKeys.length === 0) {
    board.innerHTML = '<div style="color:#bbb;font-size:14px;grid-column:1/-1;padding:32px 0;text-align:center;">검색 결과가 없습니다</div>';
    return;
  }

  orderedKeys.forEach(k => {
    const items = groups[k];
    const style = CATS[k] || { bg: '#eee', fg: '#555' };
    const col = document.createElement('div');
    col.className = 'col-wrap';

    let colHtml = `<div class="col-header">
      <span class="card-tag" style="background:${style.bg};color:${style.fg};margin:0;">${k}</span>
      <span class="col-badge">${items.length}</span>
    </div>`;

    items.forEach(c => {
      const s = catStyle(c.cat);
      const linkHtml = c.link ? `<div class="card-link"><a href="${c.link}" target="_blank">관련 링크 →</a></div>` : '';
      const hashHtml = c.hash ? `<div class="card-hash">${c.hash}</div>` : '';
      const tipHtml = c.tip ? `<div class="card-section-label">팁 / 프롬프트</div><div class="card-tip">${esc(c.tip).replace(/\n/g, '<br>')}</div>` : '';
      const newBadge = c.isNew ? `<span class="new-badge">NEW</span>` : '';
      const commentHtml = (c.comments || []).map(cm =>
        `<div class="comment-item"><span class="cname">${esc(cm.name)}</span>${esc(cm.text)}</div>`
      ).join('');

      colHtml += `<div class="card" id="card-${c.id}">
        <div class="card-top">
          <span class="card-tag" style="background:${s.bg};color:${s.fg};">${catKey(c.cat)}</span>
          ${newBadge}
        </div>
        <div class="card-title">${esc(c.title)}</div>
        <div class="card-section-label">내용</div>
        <div class="card-body">${esc(c.content).replace(/\n/g, '<br>')}</div>
        ${tipHtml}
        ${hashHtml}
        ${linkHtml}
        <div class="card-meta">작성일 ${c.date} · ${esc(c.author)}</div>
        <div class="card-footer">
          <button class="like-btn${c.liked ? ' liked' : ''}" onclick="toggleLike(${c.id})">♥ ${c.likes || 0}</button>
          <button class="comment-btn" onclick="openCommentModal(${c.id})">💬 댓글 ${c.comments ? c.comments.length : 0}</button>
        </div>
        <div class="comment-area" id="comments-${c.id}">
          <div id="comment-list-${c.id}">${commentHtml}</div>
          <div class="comment-input-row">
            <input id="cname-${c.id}" type="text" placeholder="이름" style="max-width:90px;" onkeydown="if(event.key==='Enter')addComment(${c.id})">
            <input id="ctext-${c.id}" type="text" placeholder="댓글 입력..." onkeydown="if(event.key==='Enter')addComment(${c.id})">
            <button onclick="addComment(${c.id})">등록</button>
          </div>
        </div>
      </div>`;
    });

    col.innerHTML = colHtml;
    board.appendChild(col);
  });
}

function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ─── 좋아요 ────────────────────────────────────────────────
function toggleLike(id) {
  const card = cards.find(c => c.id === id);
  if (!card) return;
  card.liked = !card.liked;
  card.likes = (card.likes || 0) + (card.liked ? 1 : -1);
  if (card.likes < 0) card.likes = 0;
  save(); broadcast(); renderAll();
}

// ─── 댓글 (카드 내) ───────────────────────────────────────
function toggleComments(id) {
  const el = document.getElementById('comments-' + id);
  if (!el) return;
  el.classList.toggle('open');
}

function addComment(id) {
  const name = (document.getElementById('cname-' + id) || {}).value?.trim();
  const text = (document.getElementById('ctext-' + id) || {}).value?.trim();
  if (!name || !text) return;
  const card = cards.find(c => c.id === id);
  if (!card) return;
  if (!card.comments) card.comments = [];
  card.comments.push({ name, text });
  save(); broadcast(); renderAll();
  showToast('댓글이 등록되었습니다');
}

// ─── 댓글 모달 ────────────────────────────────────────────
function openCommentModal(id) {
  activeCommentId = id;
  const card = cards.find(c => c.id === id);
  if (!card) return;
  const title = card.title.length > 24 ? card.title.slice(0, 24) + '…' : card.title;
  document.getElementById('commentModalTitle').textContent = '💬 ' + title;
  renderCommentModalList(card);
  document.getElementById('commentModal').classList.add('open');
}

function renderCommentModalList(card) {
  const el = document.getElementById('commentModalList');
  if (!card.comments || card.comments.length === 0) {
    el.innerHTML = '<div style="font-size:13px;color:#bbb;padding:8px 0;">아직 댓글이 없습니다. 첫 댓글을 남겨 보세요!</div>';
    return;
  }
  el.innerHTML = card.comments.map(cm =>
    `<div class="comment-item"><span class="cname">${esc(cm.name)}</span>${esc(cm.text)}</div>`
  ).join('');
}

function submitCommentModal() {
  const name = document.getElementById('commentModalName').value.trim();
  const text = document.getElementById('commentModalText').value.trim();
  if (!name || !text) { showToast('이름과 댓글을 입력해 주세요'); return; }
  const card = cards.find(c => c.id === activeCommentId);
  if (!card) return;
  if (!card.comments) card.comments = [];
  card.comments.push({ name, text });
  document.getElementById('commentModalText').value = '';
  renderCommentModalList(card);
  save(); broadcast(); renderAll();
  showToast('댓글이 등록되었습니다!');
}

function closeCommentModal() {
  document.getElementById('commentModal').classList.remove('open');
  activeCommentId = null;
}

// ─── 새 게시물 모달 ────────────────────────────────────────
function openModal() { document.getElementById('modalOverlay').classList.add('open'); }
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

function submitCard() {
  const cat = document.getElementById('newCat').value;
  const author = document.getElementById('newAuthor').value.trim();
  const title = document.getElementById('newTitle').value.trim();
  const content = document.getElementById('newContent').value.trim();
  const tip = document.getElementById('newTip').value.trim();
  const hash = document.getElementById('newHash').value.trim();
  const link = document.getElementById('newLink').value.trim();

  if (!author) { showToast('작성자 이름을 입력해 주세요'); return; }
  if (!title) { showToast('제목을 입력해 주세요'); return; }
  if (!content) { showToast('내용을 입력해 주세요'); return; }

  const newCard = {
    id: Date.now(),
    cat, author, title, content, tip, hash, link,
    likes: 0, liked: false, comments: [],
    date: new Date().toISOString().split('T')[0],
    isNew: true
  };

  cards.unshift(newCard);
  save(); broadcast(); renderAll();
  closeModal();

  ['newAuthor', 'newTitle', 'newContent', 'newTip', 'newHash', 'newLink'].forEach(id => {
    document.getElementById(id).value = '';
  });

  showToast('게시물이 등록되었습니다!');
  setTimeout(() => {
    newCard.isNew = false;
    save(); renderAll();
  }, 6000);
}

// ─── 토스트 ────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── 모달 외부 클릭 닫기 ──────────────────────────────────
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.getElementById('commentModal').addEventListener('click', function(e) {
  if (e.target === this) closeCommentModal();
});

// ─── 주기적 폴링 (localStorage 변경 감지) ─────────────────
window.addEventListener('storage', (e) => {
  if (e.key === STORAGE_KEY && e.newValue) {
    try {
      cards = JSON.parse(e.newValue);
      renderAll();
      showToast('다른 팀원이 업데이트했어요!');
    } catch(err) {}
  }
});

// ─── 초기화 ────────────────────────────────────────────────
load();
renderAll();
</script>
</body>
</html>
