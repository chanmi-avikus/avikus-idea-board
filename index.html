<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WLC Board</title>
<style>
/* ── [STYLE] 캡처본 UI 완벽 복구 ── */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', '맑은 고딕', sans-serif; background: #fdfdfb; color: #1a1a1a; font-size: 14px; line-height: 1.6; }

/* 상단 헤더 & 실시간 LIVE */
.header { position: sticky; top: 0; z-index: 50; background: #fff; border-bottom: 1px solid #f0f0eb; padding: 14px 20px 0; }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.brand-title { font-size: 20px; font-weight: 800; color: #111; }
.brand-title span { color: #4F46E5; }
.brand-sub { font-size: 11px; color: #bbb; margin-left: 8px; }
.live-pill { display: flex; align-items: center; gap: 5px; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 99px; padding: 2px 10px; font-size: 10px; font-weight: 700; color: #16a34a; }
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; animation: blink 1.5s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* 상단 스탯 (캡처본과 동일한 4그리드) */
.stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); border-top: 1px solid #f0f0eb; }
.stat-item { padding: 15px; text-align: center; border-right: 1px solid #f0f0eb; }
.stat-item:last-child { border-right: none; }
.stat-item .s-label { font-size: 10px; color: #bbb; margin-bottom: 4px; }
.stat-item .s-val { font-size: 22px; font-weight: 700; color: #111; }

.wrap { padding: 20px; max-width: 100%; margin: 0 auto; }

/* 컨트롤 영역 (기여자 & 필터 배치를 캡처본과 맞춤) */
.control-row { display: grid; grid-template-columns: 1fr 320px; gap: 15px; margin-bottom: 20px; }
.award-box { background: #fff; border: 1px solid #eee; border-radius: 8px; padding: 15px; }
.award-winner { background: #fdfdfb; border: 1px solid #f0f0eb; border-radius: 6px; padding: 10px; margin-top: 10px; font-size: 13px; }

.filter-area { background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
.add-btn { background: #4F46E5; color: #fff; border: none; border-radius: 6px; padding: 8px 12px; font-size: 12px; font-weight: 700; cursor: pointer; }

/* 보드 그리드 (캡처본 컬럼 순서 복구) */
.board { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 20px; }
.col { min-width: 270px; flex: 1; }
.col-header { display: flex; align-items: center; gap: 8px; margin-bottom: 15px; padding-left: 5px; }
.col-bar { width: 3px; height: 16px; border-radius: 2px; }

/* 카드 스타일 */
.card { background: #fff; border: 1px solid #eee; border-radius: 10px; padding: 15px; margin-bottom: 12px; position: relative; transition: 0.2s; }
.card:hover { border-color: #4F46E5; }

/* ★ 편집 버튼 ★ */
.edit-btn { position: absolute; top: 15px; right: 15px; font-size: 11px; color: #4F46E5; cursor: pointer; font-weight: 600; }

.card-tag { display: inline-block; font-size: 9px; font-weight: 700; padding: 2px 8px; border-radius: 99px; margin: 8px 0; }
.card-title { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
.card-body { font-size: 12px; color: #666; line-height: 1.6; }

/* 모달 & 토스트 */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; display: none; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: #fff; padding: 20px; border-radius: 12px; width: 380px; }
.modal input, .modal select, .modal textarea { width: 100%; margin-bottom: 10px; padding: 8px; border: 1px solid #eee; border-radius: 6px; }
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 20px; border-radius: 8px; opacity: 0; transition: 0.3s; z-index: 200; }
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="brand"><div class="brand-title">WLC <span>Board</span></div><div class="brand-sub">우리 팀의 살아있는 지식 허브</div></div>
    <div class="live-pill"><span class="live-dot"></span> LIVE</div>
  </div>
  <div class="stats-bar">
    <div class="stat-item"><div class="s-label">전체 게시물</div><div class="s-val" id="statTotal">10</div></div>
    <div class="stat-item"><div class="s-label">이번 달</div><div class="s-val">4</div></div>
    <div class="stat-item"><div class="s-label">좋아요</div><div class="s-val">12</div></div>
    <div class="stat-item"><div class="s-label">댓글</div><div class="s-val">3</div></div>
  </div>
</div>

<div class="wrap">
  <div class="control-row">
    <div class="award-box">
      <h3>🏆 이달의 기여자</h3>
      <div class="award-winner"><strong>🥇 1위: 강찬미 매니저님</strong> (게시물 10개)</div>
    </div>
    <div class="filter-area">
      <select id="filterCat" onchange="render()"><option value="">전체 카테고리</option></select>
      <button class="add-btn" onclick="openModal()">+ 새 게시물 등록</button>
    </div>
  </div>
  <div class="board" id="boardContainer"></div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">새 지식 등록</h3><br>
    <input type="hidden" id="editId">
    <select id="newCat"></select>
    <input id="newAuthor" type="text" placeholder="작성자 성함">
    <input id="newTitle" type="text" placeholder="제목">
    <textarea id="newContent" placeholder="내용" rows="5"></textarea>
    <button class="add-btn" id="submitBtn" style="width:100%" onclick="submitCard()">게시하기</button>
    <button onclick="closeModal()" style="width:100%; background:none; border:none; margin-top:10px; color:#999; cursor:pointer;">취소</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ──────────────── [중요] 매니저님 URL 여기 넣으세요 ──────────────── */
const FLOW_URL = "여기에_파워_오토메이트_URL_복사"; 
/* ────────────────────────────────────────────────────────── */

const CATS = {
  "업무치트키": { bar: "#4C6EF5", bg: "#EEF4FF", fg: "#3B5BDB" },
  "팀 패치노트": { bar: "#7950F2", bg: "#F3F0FF", fg: "#6741D9" },
  "기술 SOS": { bar: "#F76707", bg: "#FFF4E6", fg: "#C96500" },
  "에너지 세이버": { bar: "#40C057", bg: "#EBFBEE", fg: "#2F9E44" },
  "미식 가이드": { bar: "#FAB005", bg: "#FFF9DB", fg: "#B08700" },
  "오프 리듬": { bar: "#E64980", bg: "#FFF0F6", fg: "#C2255C" }
};

// ── [복구] 캡처본 속 실제 예시 데이터들 ──
const defaultData = [
  { cat:"업무치트키", author:"강찬미", date:"2026-03-17", title:"엔지니어의 퇴근을 앞당기는 Claude 활용법", content:"내 소중한 소스코드를 직접 올리지 않고도 로직과 구조만 올려보세요!" },
  { cat:"팀 패치노트", author:"강찬미", date:"2026-03-17", title:"알림 지옥에서 탈출! 오전 '몰입 타임' 도입 후기", content:"오전 10시~12시는 Deep Work 세션으로 고정하여 몰입도를 높입니다." },
  { cat:"기술 SOS", author:"강찬미", date:"2026-03-16", title:"지라 티켓 번호를 깃허브 메시지에 자동 연동", content:"커밋 메시지에 티켓 번호만 넣으면 자동으로 상태가 변경되게 설정하는 팁입니다." },
  { cat:"미식 가이드", author:"강찬미", date:"2026-03-10", title:"파트너사 미팅 후 실패 없는 맛집", content:"정갈한 한정식 코스부터 조용한 대화가 가능한 장소 리스트입니다." }
];

let cards = [];
let isEditing = false;

async function load() {
  try {
    const res = await fetch(FLOW_URL);
    const data = await res.json();
    cards = (data && data.value) ? data.value : [];
    // 엑셀이 비어있으면 예시 데이터를 사용
    if (cards.length === 0) cards = defaultData;
    render();
  } catch (e) {
    cards = defaultData; // 에러 시 예시 사용
    render();
  }
}

function render() {
  const container = document.getElementById('boardContainer'); container.innerHTML = '';
  const filterCat = document.getElementById('filterCat').value;

  Object.keys(CATS).forEach(cat => {
    if(filterCat && filterCat !== cat) return;
    const colItems = cards.filter(d => d.cat === cat);
    const s = CATS[cat];
    const col = document.createElement('div');
    col.className = 'col';
    col.innerHTML = `
      <div class="col-header"><div class="col-bar" style="background:${s.bar}"></div><strong>${cat}</strong> <small style="color:#999; margin-left:4px;">${colItems.length}</small></div>
      ${colItems.map(d => `
        <div class="card">
          <div class="edit-btn" onclick="openEdit('${d.title}')">편집</div>
          <div style="font-size:11px; color:#aaa;">${d.author} · ${d.date}</div>
          <div class="card-tag" style="background:${s.bg}; color:${s.fg}">${cat}</div>
          <div class="card-title">${d.title}</div>
          <div class="card-body">${d.content}</div>
        </div>
      `).join('')}
    `;
    container.appendChild(col);
  });
}

function openEdit(title) {
  const card = cards.find(c => c.title === title);
  if(!card) return;
  isEditing = true;
  document.getElementById('modalTitle').textContent = "게시물 수정";
  document.getElementById('submitBtn').textContent = "수정하기";
  document.getElementById('newCat').value = card.cat;
  document.getElementById('newAuthor').value = card.author;
  document.getElementById('newTitle').value = card.title;
  document.getElementById('newContent').value = card.content;
  openModal();
}

async function submitCard() {
  const payload = {
    date: new Date().toISOString().split('T')[0],
    cat: document.getElementById('newCat').value,
    author: document.getElementById('newAuthor').value,
    title: document.getElementById('newTitle').value,
    content: document.getElementById('newContent').value,
    action: isEditing ? "EDIT" : "CREATE"
  };
  showToast("엑셀 저장 중...");
  await fetch(FLOW_URL, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(payload) });
  closeModal();
  load();
}

function init() {
  const f = document.getElementById('filterCat'); const n = document.getElementById('newCat');
  Object.keys(CATS).forEach(c => { f.innerHTML += `<option value="${c}">${c}</option>`; n.innerHTML += `<option value="${c}">${c}</option>`; });
  load();
}
function openModal() { document.getElementById('modalOverlay').classList.add('open'); }
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); isEditing = false; }
function showToast(m) { const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2500); }

window.onload = init;
</script>
</body>
</html>
