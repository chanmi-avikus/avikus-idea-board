<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>WLC Board</title>
<style>
/* [디자인] 캡처본 UI 완벽 복구 */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Malgun Gothic', sans-serif; background: #fdfdfb; color: #1a1a1a; font-size: 13px; }

/* 헤더 & 스탯바 */
.header { position: sticky; top: 0; z-index: 100; background: #fff; padding: 15px 20px; border-bottom: 1px solid #f0f0eb; display: flex; justify-content: space-between; align-items: center; }
.brand-title { font-size: 18px; font-weight: 900; }
.brand-title span { color: #4F46E5; }
.stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); border-bottom: 1px solid #f0f0eb; background: #fff; }
.stat-item { padding: 12px; text-align: center; border-right: 1px solid #f0f0eb; }

/* 보드 레이아웃 (캡처본 image_340d0f.png 기준) */
.board { display: flex; gap: 12px; padding: 20px; overflow-x: auto; align-items: flex-start; }
.col { min-width: 270px; flex: 1; border-radius: 8px; padding: 12px; min-height: 500px; }

/* 카테고리별 배경색 */
.col-업무치트키 { background: #fff0f0; } .col-팀패치노트 { background: #f3f0ff; }
.col-기술SOS { background: #e7f5ff; } .col-에너지세이버 { background: #ebfbee; }
.col-미식가이드 { background: #fff9db; } .col-오프리듬 { background: #f3f0ff; }

.card { background: #fff; border-radius: 8px; padding: 15px; margin-bottom: 12px; border: 1px solid rgba(0,0,0,0.03); position: relative; }
.card-title { font-weight: 800; font-size: 14px; margin-bottom: 8px; }
.card-body { font-size: 12px; color: #555; white-space: pre-wrap; }

/* 버튼 및 모달 */
.add-btn { background: #4F46E5; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: none; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: #fff; padding: 25px; border-radius: 12px; width: 380px; }
</style>
</head>
<body>

<div class="header">
    <div class="brand-title">WLC <span>Board</span></div>
    <button class="add-btn" onclick="openModal()">+ 새 게시물</button>
</div>

<div class="stats-bar">
    <div class="stat-item"><div style="font-size:10px; color:#bbb;">전체 게시물</div><div id="statTotal" style="font-size:18px; font-weight:bold;">10</div></div>
    <div class="stat-item"><div style="font-size:10px; color:#bbb;">이번 달</div><div style="font-size:18px; font-weight:bold;">4</div></div>
    <div class="stat-item"><div style="font-size:10px; color:#bbb;">좋아요</div><div style="font-size:18px; font-weight:bold;">12</div></div>
    <div class="stat-item"><div style="font-size:10px; color:#bbb;">댓글</div><div style="font-size:18px; font-weight:bold;">3</div></div>
</div>

<div class="board" id="boardContainer"></div>

<script>
const FLOW_URL = "https://default48c3cf2c29be407f80f9b5dc00c35c.de.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/38e4719e3d274fd19345b28e2ec440fc/triggers/manual/paths/invoke?api-version=1";

const CATS = ["업무치트키", "팀 패치노트", "기술 SOS", "에너지 세이버", "미식 가이드", "오프 리듬"];

// 캡처본 예시 데이터
const defaultData = [
    { cat:"업무치트키", author:"강찬미", date:"2026-03-17", title:"Claude 활용으로 퇴근 앞당기기", content:"로직과 구조만 올려서 빠르게 업무를 처리하세요!" },
    { cat:"팀 패치노트", author:"강찬미", date:"2026-03-17", title:"오전 '몰입 타임' 도입 후기", content:"10시~12시는 딥워크 세션으로 고정합니다." },
    { cat:"기술 SOS", author:"강찬미", date:"2026-03-16", title:"지라-깃허브 연동 자동화", content:"커밋 메시지만으로 티켓 상태를 관리하세요." }
];

let excelData = [];

// ★ 핵심: 로딩 실패와 상관없이 화면을 먼저 그립니다.
function render() {
    const container = document.getElementById('boardContainer');
    container.innerHTML = '';
    const allCards = [...excelData, ...defaultData]; // 합쳐서 출력
    
    CATS.forEach(cat => {
        const items = allCards.filter(d => (d.cat || d.카테고리) === cat);
        const colClass = "col-" + cat.replace(/\s/g, '');
        const col = document.createElement('div');
        col.className = `col ${colClass}`;
        col.innerHTML = `
            <div style="font-weight:bold; margin-bottom:15px; display:flex; justify-content:space-between;">
                <span>${cat}</span><span style="color:#999">${items.length}</span>
            </div>
            ${items.map(d => `
                <div class="card">
                    <div class="card-title">${d.title || d.제목}</div>
                    <div class="card-body">${d.content || d.내용}</div>
                    <div style="font-size:10px; color:#aaa; margin-top:8px;">${d.author || d.작성자}</div>
                </div>
            `).join('')}
        `;
        container.appendChild(col);
    });
    document.getElementById('statTotal').textContent = allCards.length;
}

// 데이터를 나중에 가져와서 합칩니다.
async function load() {
    try {
        const res = await fetch(FLOW_URL);
        const data = await res.json();
        if(data && data.value) excelData = data.value;
        render(); // 데이터 오면 다시 그리기
    } catch (e) {
        console.log("연결 지연 중... 기본 데이터를 유지합니다.");
    }
}

function openModal() { /* 모달 열기 로직 */ }
window.onload = () => { render(); load(); }; // 1순위: 화면 그리기, 2순위: 데이터 가져오기
</script>
</body>
</html>
