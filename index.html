<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>WLC Board</title>
    <style>
        /* 캡처본 image_340d0f.png 디자인 100% 재현 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Malgun Gothic', sans-serif; background: #fdfdfb; color: #1a1a1a; font-size: 13px; line-height: 1.5; }
        
        .header { position: sticky; top: 0; z-index: 100; background: #fff; padding: 12px 20px; border-bottom: 1px solid #f0f0eb; display: flex; justify-content: space-between; align-items: center; }
        .brand-title { font-size: 18px; font-weight: 900; }
        .brand-title span { color: #4F46E5; }
        
        .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); border-bottom: 1px solid #f0f0eb; background: #fff; }
        .stat-item { padding: 12px; text-align: center; border-right: 1px solid #f0f0eb; }
        .stat-value { font-size: 18px; font-weight: bold; }

        .board { display: flex; gap: 12px; padding: 20px; overflow-x: auto; align-items: flex-start; }
        .col { min-width: 280px; flex: 1; border-radius: 12px; padding: 15px; min-height: 600px; }

        /* 카테고리별 파스텔 배경색 */
        .col-업무치트키 { background: #fff0f0; }
        .col-팀패치노트 { background: #f3f0ff; }
        .col-기술SOS { background: #e7f5ff; }
        .col-에너지세이버 { background: #ebfbee; }
        .col-미식가이드 { background: #fff9db; }
        .col-오프리듬 { background: #f3f0ff; }

        .card { background: #fff; border-radius: 10px; padding: 16px; margin-bottom: 12px; border: 1px solid rgba(0,0,0,0.03); box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .card-tag { display: inline-block; font-size: 9px; font-weight: bold; padding: 2px 8px; border-radius: 4px; margin-bottom: 8px; }
        .card-title { font-weight: 800; font-size: 14px; margin-bottom: 8px; color: #111; }
        .card-body { font-size: 12px; color: #555; white-space: pre-wrap; margin-bottom: 12px; }
        
        .add-btn { background: #4F46E5; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: none; align-items: center; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .modal { background: #fff; padding: 30px; border-radius: 16px; width: 400px; }
        .modal input, .modal select, .modal textarea { width: 100%; margin-bottom: 12px; padding: 12px; border: 1px solid #eee; border-radius: 8px; }
    </style>
</head>
<body>

<div class="header">
    <div class="brand-title">WLC <span>Board</span></div>
    <button class="add-btn" onclick="openModal()">+ 새 지식 등록</button>
</div>

<div class="stats-bar">
    <div class="stat-item"><div>전체</div><div id="statTotal" class="stat-value">0</div></div>
    <div class="stat-item"><div>이번 달</div><div class="stat-value">4</div></div>
    <div class="stat-item"><div>좋아요</div><div class="stat-value">12</div></div>
    <div class="stat-item"><div>댓글</div><div class="stat-value">3</div></div>
</div>

<div class="board" id="boardContainer"></div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h3>새 지식 등록</h3><br>
        <select id="newCat">
            <option>업무치트키</option><option>팀 패치노트</option><option>기술 SOS</option>
            <option>에너지 세이버</option><option>미식 가이드</option><option>오프 리듬</option>
        </select>
        <input id="newAuthor" type="text" placeholder="작성자 성함">
        <input id="newTitle" type="text" placeholder="제목">
        <textarea id="newContent" placeholder="내용" rows="5"></textarea>
        <button class="add-btn" style="width:100%" onclick="submitCard()">게시하기</button>
        <button onclick="closeModal()" style="width:100%; background:none; border:none; margin-top:10px; color:#999; cursor:pointer;">취소</button>
    </div>
</div>
