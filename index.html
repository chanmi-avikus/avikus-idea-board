<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>WLC Board</title>
<style>
/* [Style] 매니저님 캡처본 UI 100% 복구 */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #fdfdfb; color: #1a1a1a; font-size: 14px; }
.header { position: sticky; top: 0; z-index: 50; background: #fff; padding: 15px 20px; border-bottom: 1px solid #f0f0eb; }
.brand-title { font-size: 20px; font-weight: 800; }
.brand-title span { color: #4F46E5; }
.stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); border-top: 1px solid #f0f0eb; margin-top: 10px; }
.stat-item { padding: 12px; text-align: center; border-right: 1px solid #f0f0eb; }
.wrap { padding: 20px; }
.board { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 20px; }
.col { min-width: 280px; flex: 1; }
.card { background: #fff; border: 1px solid #eee; border-radius: 10px; padding: 15px; margin-bottom: 12px; position: relative; }
.edit-btn { position: absolute; top: 15px; right: 15px; font-size: 11px; color: #4F46E5; cursor: pointer; font-weight: 600; background: #f5f7ff; padding: 2px 6px; border-radius: 4px; }
.card-tag { display: inline-block; font-size: 9px; font-weight: 700; padding: 2px 8px; border-radius: 99px; margin: 8px 0; }
.card-title { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
.card-body { font-size: 12px; color: #666; line-height: 1.6; white-space: pre-wrap; }
/* 모달 생략 (동일) */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; display: none; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: #fff; padding: 25px; border-radius: 12px; width: 400px; }
.add-btn { background: #4F46E5; color: #fff; border: none; border-radius: 6px; padding: 10px 20px; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>

<div class="header">
  <div class="brand-title">WLC <span>Board</span></div>
  <div class="stats-bar">
    <div class="stat-item"><div style="font-size:10px; color:#bbb;">전체 게시물</div><div id="statTotal">10</div></div>
    <div class="stat-item"><div style="font-size:10px; color:#bbb;">이번 달</div><div>4</div></div>
    <div class="stat-item"><div style="font-size:10px; color:#bbb;">좋아요</div><div>12</div></div>
    <div class="stat-item"><div style="font-size:10px; color:#bbb;">댓글</div><div>3</div></div>
  </div>
</div>

<div class="wrap">
  <div style="display:flex; justify-content: flex-end; margin-bottom: 20px;">
    <button class="add-btn" onclick="openModal()">+ 새 게시물 등록</button>
  </div>
  <div class="board" id="boardContainer"></div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>새 지식 등록</h3><br>
    <select id="newCat"></select>
    <input id="newAuthor" type="text" placeholder="작성자 성함">
    <input id="newTitle" type="text" placeholder="제목">
    <textarea id="newContent" placeholder="내용" rows="5"></textarea>
    <button class="add-btn" style="width:100%" onclick="submitCard()">게시하기</button>
    <button onclick="closeModal()" style="width:100%; background:none; border:none; margin-top:10px; color:#999; cursor:pointer;">취소</button>
  </div>
</div>

<script>
const FLOW_URL = "https://default48c3cf2c29be407f80f9b5dc00c35c.de.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/38e4719e3d274fd19345b28e2ec440fc/triggers/manual/paths/invoke?api-version=1"; 

const CATS = {
  "업무치트키": { bar: "#4C6EF5", bg: "#EEF4FF", fg: "#3B5BDB" },
  "팀 패치노트": { bar: "#7950F2", bg: "#F3F0FF", fg: "#6741D9" },
  "기술 SOS": { bar: "#F76707", bg: "#FFF4E6", fg: "#C96500" },
  "에너지 세이버": { bar: "#40C057", bg: "#EBFBEE", fg: "#2F9E44" },
  "미식 가이드": { bar: "#FAB005", bg: "#FFF9DB", fg: "#B08700" },
  "오프 리듬": { bar: "#E64980", bg: "#FFF0F6", fg: "#C2255C" }
};

// [복구] 캡처본에 있던 실제 데이터들
const defaultData = [
  { cat:"업무치트키", author:"강찬미", date:"2026-03-17", title:"Claude 활용으로 퇴근 앞당기기", content:"소스코드 리뷰와 문서 초안 작성을 Claude에게 맡겨보세요." },
  { cat:"팀 패치노트", author:"강찬미", date:"2026-03-17", title:"스탠드업 미팅 슬랙 전환 후기", content:"매일 30분씩 소요되던 대면 미팅을 슬랙 허들로 대체했습니다." },
  { cat:"기술 SOS", author:"강찬미", date:"2026-03-16", title:"지라-깃허브 자동 연동 꿀팁", content:"커밋 메시지에 티켓 번호를 넣으면 자동으로 지라 상태가 변경됩니다." },
  { cat:"미식 가이드", author:"강찬미", date:"2026-03-10", title:"오피스 근처 맛집 리스트", content:"팀 점심 회식으로 추천하는 장소 5곳입니다." }
];

let excelData = [];

async function load() {
  try {
    const res = await fetch(FLOW_URL);
    const data = await res.json();
    excelData = (data && data.value) ? data.value : [];
    render();
  } catch (e) { render(); }
}

function render() {
  const container = document.getElementById('boardContainer');
  container.innerHTML = '';
  
  // 예시 데이터와 엑셀 데이터를 합침
  const allCards = [...excelData, ...defaultData];
  
  Object.keys(CATS).forEach(cat => {
    const colItems = allCards.filter(d => d.cat === cat || d.카테고리 === cat);
    const s = CATS[cat];
    const col = document.createElement('div');
    col.className = 'col';
    col.innerHTML = `
      <div style="margin-bottom:15px;"><span style="border-left:3px solid ${s.bar}; padding-left:8px; font-weight:bold;">${cat}</span></div>
      ${colItems.map(d => `
        <div class="card">
          <div class="edit-btn">편집</div>
          <div style="font-size:11px; color:#999;">${d.author || d.작성자} · ${d.date || d.날짜}</div>
          <div class="card-tag" style="background:${s.bg}; color:${s.fg}">${cat}</div>
          <div class="card-title">${d.title || d.제목}</div>
          <div class="card-body">${d.content || d.내용}</div>
        </div>
      `).join('')}
    `;
    container.appendChild(col);
  });
  document.getElementById('statTotal').textContent = allCards.length;
}

async function submitCard() {
  const newCard = {
    date: new Date().toISOString().split('T')[0],
    cat: document.getElementById('newCat').value,
    author: document.getElementById('newAuthor').value,
    title: document.getElementById('newTitle').value,
    content: document.getElementById('newContent').value
  };

  excelData.unshift(newCard); // 화면에 즉시 추가
  render();
  closeModal();

  await fetch(FLOW_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ ...newCard, action: "CREATE" })
  });
}

function init() {
  const n = document.getElementById('newCat');
  Object.keys(CATS).forEach(c => { n.innerHTML += `<option value="${c}">${c}</option>`; });
  load();
}
function openModal() { document.getElementById('modalOverlay').classList.add('open'); }
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
window.onload = init;
</script>
</body>
</html>
