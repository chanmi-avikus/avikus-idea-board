<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WLC Board</title>
    <style>
        /* [1. 디자인] 캡처본 UI 완벽 복구 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; background: #fdfdfb; color: #1a1a1a; font-size: 13px; line-height: 1.5; overflow-x: hidden; }

        /* 헤더 & 통계바 */
        .header { position: sticky; top: 0; z-index: 100; background: #fff; padding: 12px 20px; border-bottom: 1px solid #f0f0eb; display: flex; justify-content: space-between; align-items: center; }
        .brand-title { font-size: 18px; font-weight: 900; }
        .brand-title span { color: #4F46E5; }
        .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); border-bottom: 1px solid #f0f0eb; background: #fff; }
        .stat-item { padding: 12px; text-align: center; border-right: 1px solid #f0f0eb; }
        .stat-item:last-child { border-right: none; }
        .stat-label { font-size: 10px; color: #bbb; margin-bottom: 2px; }
        .stat-value { font-size: 18px; font-weight: bold; }

        /* [2. 보드 레이아웃] 카테고리별 파스텔 배경색 */
        .board { display: flex; gap: 12px; padding: 20px; overflow-x: auto; align-items: flex-start; min-height: 85vh; }
        .col { min-width: 280px; flex: 1; border-radius: 12px; padding: 15px; min-height: 650px; }

        .col-업무치트키 { background: #fff0f0; }
        .col-팀패치노트 { background: #f3f0ff; }
        .col-기술SOS { background: #e7f5ff; }
        .col-에너지세이버 { background: #ebfbee; }
        .col-미식가이드 { background: #fff9db; }
        .col-오프리듬 { background: #f3f0ff; }

        /* [3. 카드 디자인] */
        .card { background: #fff; border-radius: 10px; padding: 16px; margin-bottom: 12px; position: relative; border: 1px solid rgba(0,0,0,0.03); box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .card-tag { display: inline-block; font-size: 9px; font-weight: bold; padding: 2px 8px; border-radius: 4px; margin-bottom: 8px; }
        .card-title { font-weight: 800; font-size: 14px; margin-bottom: 8px; color: #111; }
        .card-body { font-size: 12px; color: #555; white-space: pre-wrap; margin-bottom: 12px; line-height: 1.6; }
        .card-info { font-size: 11px; color: #aaa; padding-top: 10px; border-top: 1px solid #f8f8f8; display: flex; justify-content: space-between; }

        /* [4. 버튼 & 모달] */
        .add-btn { background: #4F46E5; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: none; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        .modal-overlay.open { display: flex; }
        .modal { background: #fff; padding: 30px; border-radius: 16px; width: 400px; }
        .modal input, .modal select, .modal textarea { width: 100%; margin-bottom: 12px; padding: 12px; border: 1px solid #eee; border-radius: 8px; font-size: 13px; }
    </style>
</head>
<body>

<div class="header">
    <div class="brand-title">WLC <span>Board</span></div>
    <button class="add-btn" onclick="openModal()">+ 새 지식 등록</button>
</div>

<div class="stats-bar">
    <div class="stat-item"><div class="stat-label">전체 게시물</div><div class="stat-value" id="statTotal">0</div></div>
    <div class="stat-item"><div class="stat-label">이번 달</div><div class="stat-value">4</div></div>
    <div class="stat-item"><div class="stat-label">좋아요</div><div class="stat-value">12</div></div>
    <div class="stat-item"><div class="stat-label">댓글</div><div class="stat-value">3</div></div>
</div>

<div class="board" id="boardContainer"></div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h3 style="margin-bottom:20px;">새 지식 등록</h3>
        <select id="newCat"></select>
        <input id="newAuthor" type="text" placeholder="작성자 성함 (예: 강찬미)">
        <input id="newTitle" type="text" placeholder="제목을 입력하세요">
        <textarea id="newContent" placeholder="나누고 싶은 지식을 입력하세요" rows="6"></textarea>
        <button class="add-btn" style="width:100%; padding:15px;" onclick="submitCard()">게시하기</button>
        <button onclick="closeModal()" style="width:100%; background:none; border:none; margin-top:15px; color:#999; cursor:pointer; font-size:12px;">취소</button>
    </div>
</div>

<script>
    const FLOW_URL = "https://default48c3cf2c29be407f80f9b5dc00c35c.de.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/38e4719e3d274fd19345b28e2ec440fc/triggers/manual/paths/invoke?api-version=1";

    const CAT_INFO = {
        "업무치트키": { tagBg: "#EEF4FF", tagFg: "#3B5BDB" },
        "팀 패치노트": { tagBg: "#F3F0FF", tagFg: "#6741D9" },
        "기술 SOS": { tagBg: "#E7F5FF", tagFg: "#0077CC" },
        "에너지 세이버": { tagBg: "#EBFBEE", tagFg: "#2F9E44" },
        "미식 가이드": { tagBg: "#FFF9DB", tagFg: "#B08700" },
        "오프 리듬": { tagBg: "#FFF0F6", tagFg: "#C2255C" }
    };

    // [5. 예시 데이터] 캡처본에 있던 실제 내용들
    const defaultData = [
        { cat:"업무치트키", author:"강찬미", date:"2026-03-17", title:"Claude 활용으로 퇴근 앞당기기", content:"소스코드 리뷰와 문서 초안 작성을 Claude에게 맡겨보세요. 로직과 구조만 올려도 충분합니다!" },
        { cat:"팀 패치노트", author:"강찬미", date:"2026-03-17", title:"오전 '몰입 타임' 도입 후기", content:"오전 10시~12시는 딥워크 세션으로 고정하여 팀원 모두의 몰입도를 높입니다." },
        { cat:"기술 SOS", author:"강찬미", date:"2026-03-16", title:"지라-깃허브 자동 연동 꿀팁", content:"커밋 메시지에 티켓 번호만 넣으면 자동으로 지라 상태가 변경되도록 설정해 보세요." },
        { cat:"미식 가이드", author:"강찬미", date:"2026-03-10", title:"파트너사 미팅 추천 맛집", content:"정갈한 한정식 코스부터 조용한 대화가 가능한 장소 리스트입니다." }
    ];

    let excelData = [];

    function render() {
        const container = document.getElementById('boardContainer');
        container.innerHTML = '';
        const allCards = [...excelData, ...defaultData];
        
        Object.keys(CAT_INFO).forEach(cat => {
            const items = allCards.filter(d => (d.cat || d.카테고리) === cat);
            const colId = cat.replace(/\s/g, '');
            const col = document.createElement('div');
            col.className = `col col-${colId}`;
            col.innerHTML = `
                <div style="font-weight:bold; margin-bottom:18px; display:flex; justify-content:space-between; align-items:center;">
                    <span>${cat}</span><span style="color:#999; font-size:11px;">${items.length}</span>
                </div>
                ${items.map(d => `
                    <div class="card">
                        <div class="card-tag" style="background:${CAT_INFO[cat].tagBg}; color:${CAT_INFO[cat].tagFg}">${cat}</div>
                        <div class="card-title">${d.title || d.제목}</div>
                        <div class="card-body">${d.content || d.내용}</div>
                        <div class="card-info"><span>${d.author || d.작성자}</span><span>${d.date || d.날짜}</span></div>
                    </div>
                `).join('')}
            `;
            container.appendChild(col);
        });
        document.getElementById('statTotal').textContent = allCards.length;
    }

    async function load() {
        try {
            const res = await fetch(FLOW_URL);
            const data = await res.json();
            if (data && data.value) { excelData = data.value; render(); }
        } catch (e) { console.warn("엑셀 연결 대기 중..."); }
    }

    async function submitCard() {
        const newCard = {
            date: new Date().toISOString().split('T')[0],
            cat: document.getElementById('newCat').value,
            author: document.getElementById('newAuthor').value || "익명",
            title: document.getElementById('newTitle').value,
            content: document.getElementById('newContent').value
        };
        if(!newCard.title || !newCard.content) return alert("제목과 내용을 입력해주세요!");

        excelData.unshift(newCard); // 즉시 반영
        render();
        closeModal();

        try {
            await fetch(FLOW_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ ...newCard, action: "CREATE" })
            });
        } catch (e) { console.error("엑셀 저장 실패"); }
    }

    function init() {
        const catSelect = document.getElementById('newCat');
        Object.keys(CAT_INFO).forEach(c => {
            const opt = document.createElement('option');
            opt.value = c; opt.innerText = c;
            catSelect.appendChild(opt);
        });
        render(); // 예시 데이터 선출력
        load();   // 엑셀 데이터 후출력
    }

    function openModal() { document.getElementById('modalOverlay').classList.add('open'); }
    function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
    window.onload = init;
</script>
</body>
</html>
